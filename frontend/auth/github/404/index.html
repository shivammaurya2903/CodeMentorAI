<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Authorization Cancelled | CodeMentor AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: rgba(17, 24, 39, 0.9);
      --border: rgba(148, 163, 184, 0.2);
      --text: #f8fafc;
      --muted: #94a3b8;
      --danger: #fb7185;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(251, 113, 133, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(148, 163, 184, 0.14), transparent 25%),
        var(--bg);
    }

    .card {
      width: min(720px, calc(100vw - 2rem));
      padding: 2.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      background: rgba(251, 113, 133, 0.14);
      color: #fda4af;
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 56ch;
      margin: 1rem auto 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .button {
      padding: 0.9rem 1.35rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover { transform: translateY(-1px); }

    .button.primary {
      color: #fff;
      background: linear-gradient(135deg, #ef4444, var(--danger));
      box-shadow: 0 16px 30px rgba(251, 113, 133, 0.22);
    }

    .button.secondary {
      color: var(--text);
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.5);
    }

    .meta {
      margin-top: 1.25rem;
      font-family: "JetBrains Mono", monospace;
      color: #cbd5e1;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">GitHub authorization cancelled</div>
    <h1>404 - GitHub page not available</h1>
    <p>The GitHub authorization flow was cancelled or could not be completed. You can go back and try connecting again when you are ready.</p>
    <div class="actions">
      <a class="button primary" href="../../../index.html">Back to Dashboard</a>
      <a class="button secondary" href="../../../review.html">Open Code Review</a>
    </div>
    <div class="meta" id="status-line">Waiting for a new GitHub connection attempt.</div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || '');
      var statusLine = document.getElementById('status-line');
      var message = params.get('message');
      var reason = params.get('reason');

      if (message) {
        statusLine.textContent = message;
        return;
      }

      if (reason === 'cancelled') {
        statusLine.textContent = 'The GitHub authorization dialog was closed or denied.';
        return;
      }

      if (reason) {
        statusLine.textContent = 'Reason: ' + reason;
      }
    })();
  </script>
</body>
</html>
