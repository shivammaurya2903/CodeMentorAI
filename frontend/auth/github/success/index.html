<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Connected | CodeMentor AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.24), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.18), transparent 25%),
        var(--bg);
    }

    .card {
      width: min(720px, calc(100vw - 2rem));
      padding: 2.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.14);
      color: #86efac;
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 56ch;
      margin: 1rem auto 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .button {
      padding: 0.9rem 1.35rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover { transform: translateY(-1px); }

    .button.primary {
      color: #08111f;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 16px 30px rgba(34, 197, 94, 0.25);
    }

    .button.secondary {
      color: var(--text);
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.5);
    }

    .meta {
      margin-top: 1.25rem;
      font-family: "JetBrains Mono", monospace;
      color: #cbd5e1;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">GitHub connected successfully</div>
    <h1>Connection complete</h1>
    <p>Your GitHub account is now linked to CodeMentor AI. You can browse repositories and run AI reviews from here.</p>
    <div class="actions">
      <a class="button primary" href="../../../repo-review.html?connected=1">Go to Repo Review</a>
      <a class="button secondary" href="../../../index.html">Back to Dashboard</a>
    </div>
    <div class="meta" id="status-line">OAuth session verified.</div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || '');
      var statusLine = document.getElementById('status-line');
      if (params.get('connected') === '1') {
        statusLine.textContent = 'GitHub session established and ready.';
      }
    })();
  </script>
</body>
</html>
